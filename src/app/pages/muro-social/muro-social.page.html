<div class="page">
  <header class="topbar">
    <h1>Calvillo Experience</h1>
  </header>

  <main class="feed">
    <div class="card-publicar">
      <h3>Comparte tu experiencia</h3>
      <textarea id="descripcionPublicacion" placeholder="¿Qué descubriste en Calvillo?"></textarea>
      
      <div class="input-row">
        <div class="file-wrapper">
          <input type="file" id="imagenPublicacion" accept="image/*" />
        </div>
        <button class="btn-publicar" onclick="publicar()">Publicar</button>
      </div>
    </div>

    <div id="contenedorPublicaciones">
      <p class="loading-text">Cargando muro social...</p>
    </div>
  </main>
</div>
