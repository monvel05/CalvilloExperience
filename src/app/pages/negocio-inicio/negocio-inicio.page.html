<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Panel de Negocio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>¡Bienvenido, Socio!</ion-card-title>
      <ion-card-subtitle>Calvillo Experience</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      Aquí podrás gestionar tus productos y ver cuánta gente visita tu negocio.
    </ion-card-content>
  </ion-card>

  <ion-list lines="none">
    <ion-item button detail="true">
      <ion-icon name="storefront-outline" slot="start"></ion-icon>
      <ion-label>Mi Perfil</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
