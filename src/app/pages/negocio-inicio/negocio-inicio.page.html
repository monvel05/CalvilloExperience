<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Panel de Negocio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card color="light">
    <ion-card-header>
      <ion-card-title>Estadísticas del Día</ion-card-title>
      <ion-card-subtitle>Calvillo Experience</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <div style="font-size: 2em; font-weight: bold; color: #3880ff;">150</div>
      <p>Visitas a tu perfil hoy</p>
    </ion-card-content>
  </ion-card>

  <ion-list lines="inset">
    <ion-item button>
      <ion-icon name="create-outline" slot="start"></ion-icon>
      <ion-label>Editar Información del Local</ion-label>
    </ion-item>
    <ion-item button>
      <ion-icon name="images-outline" slot="start"></ion-icon>
      <ion-label>Galería de Fotos</ion-label>
    </ion-item>
    <ion-item button>
      <ion-icon name="star-outline" slot="start"></ion-icon>
      <ion-label>Ver Reseñas</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
