<ion-header>
  <ion-toolbar color="tertiary">
    <ion-title>Explora Calvillo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="text-align: center; margin-top: 20px;">
    <h2>¿Qué haremos hoy en Calvillo?</h2>
    <p>Descubre lugares mágicos</p>
  </div>
  
  <ion-grid>
    <ion-row>
      <ion-col size="6">
        <ion-card class="ion-text-center">
          <ion-card-content>
            <ion-icon name="restaurant-outline" size="large"></ion-icon>
            <p>Gastronomía</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
      <ion-col size="6">
        <ion-card class="ion-text-center">
          <ion-card-content>
            <ion-icon name="map-outline" size="large"></ion-icon>
            <p>Mapa</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
