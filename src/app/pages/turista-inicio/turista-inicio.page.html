<ion-header class="ion-no-border">
  <ion-toolbar style="--background: #fdfcf9;">
    <ion-title class="text-title-elegant ion-text-center">Explora Calvillo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="text-align: center; margin: 30px 0;">
    <h1 class="text-title-elegant" style="font-size: 2.2rem;">Descubre la magia</h1>
    <p style="color: #8d6e63; font-weight: 300; letter-spacing: 1px;">PUEBLO MÁGICO</p>
  </div>

  <ion-grid>
    <ion-row>
      <ion-col size="6">
        <ion-card class="card-soft-design" button>
          <ion-card-content class="ion-text-center">
            <ion-icon name="restaurant-outline" style="font-size: 2.5rem; color: #a5d6a7;"></ion-icon>
            <p style="margin-top: 10px; color: #4b2c20; font-weight: 500;">Gastronomía</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
      <ion-col size="6">
        <ion-card class="card-soft-design" button>
          <ion-card-content class="ion-text-center">
            <ion-icon name="map-outline" style="font-size: 2.5rem; color: #90caf9;"></ion-icon>
            <p style="margin-top: 10px; color: #4b2c20; font-weight: 500;">Mapa</p>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-button expand="block" class="button-primary-custom">
    EXPLORAR AHORA
  </ion-button>
</ion-content>
